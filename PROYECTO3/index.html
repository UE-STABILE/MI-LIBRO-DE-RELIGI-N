<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AR Video Experience</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <!-- ✅ ESTILO PARA QUE FUNCIONE EN HORIZONTAL -->
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background: black;
        }

        a-scene {
            width: 100vw;
            height: 100vh;
        }

        #mensaje {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 16px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            z-index: 999;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {

            const video = document.querySelector('#ar-video');
            const arTarget = document.querySelector('#ar-target');

            // 🔊 Activar audio con interacción
            const activarAudio = () => {
                video.muted = false;
                video.volume = 1;
                video.play();
                console.log("🔊 Audio activado");
            };

            document.body.addEventListener('touchstart', activarAudio, { once: true });
            document.body.addEventListener('click', activarAudio, { once: true });

            // 🎯 Control AR
            arTarget.addEventListener('targetFound', () => {
                video.play().catch(() => console.log("Esperando interacción"));
            });

            arTarget.addEventListener('targetLost', () => {
                video.pause();
            });

        });
    </script>

</head>

<body>

<!-- MENSAJE PARA EL USUARIO -->
<div id="mensaje">
👉 Toca la pantalla para activar el sonido y escanea la imagen
</div>

<!-- VIDEO -->
<video 
    id="ar-video"
    src="./asset.mp4"
    loop
    playsinline
    webkit-playsinline
    crossorigin="anonymous"
    style="display:none">
</video>

<!-- ESCENA AR -->
<a-scene 
    embedded
    mindar-image="imageTargetSrc: ./marker.mind;" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false" 
    renderer="colorManagement: true;"
>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-plane
            material="src: #ar-video"
            position="0 0 -0.5"
            rotation="0 0 0"
            height="1.18"
            width="2.0978"
            scale="2 2 2">
        </a-plane>
    </a-entity>

</a-scene>

</body>
</html>
