<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AR Video Experience</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background: black;
        }

        a-scene {
            width: 100% !important;
            height: 100% !important;
        }

        #mensaje {
            position: fixed;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            z-index: 999;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {

            const video = document.querySelector('#ar-video');
            const arTarget = document.querySelector('#ar-target');
            const scene = document.querySelector('a-scene');

            // 🔊 AUDIO
            const activarAudio = () => {
                video.muted = false;
                video.volume = 1;
                video.play();
            };

            document.body.addEventListener('touchstart', activarAudio, { once: true });
            document.body.addEventListener('click', activarAudio, { once: true });

            // 🎯 AR
            arTarget.addEventListener('targetFound', () => {
                video.play().catch(() => {});
            });

            arTarget.addEventListener('targetLost', () => {
                video.pause();
            });

            // 🔄 SOLUCIÓN CLAVE: REAJUSTE AL GIRAR
            window.addEventListener('orientationchange', () => {
                setTimeout(() => {
                    scene.renderer.setSize(window.innerWidth, window.innerHeight);
                    scene.camera.aspect = window.innerWidth / window.innerHeight;
                    scene.camera.updateProjectionMatrix();
                }, 300);
            });

        });
    </script>

</head>

<body>

<div id="mensaje">
👉 Toca la pantalla y escanea la imagen
</div>

<video 
    id="ar-video"
    src="./asset.mp4"
    loop
    playsinline
    webkit-playsinline
    crossorigin="anonymous"
    style="display:none">
</video>

<a-scene 
    embedded
    mindar-image="imageTargetSrc: ./marker.mind;" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false" 
    renderer="colorManagement: true;"
>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-plane
            material="src: #ar-video"
            position="0 0 0"
            rotation="0 0 0"
            height="1.18"
            width="2.0978"
            scale="1.8 1.8 1.8">
        </a-plane>
    </a-entity>

</a-scene>

</body>
</html>
